name: generate snake

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/snake.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: dev-julyellens
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark

      - name: reduz velocidade da cobrinha
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'dist/github-contribution-grid-snake.svg';
          const svg = fs.readFileSync(file, 'utf8');
          const slower = svg.replace(
            /(animation:none(?: linear)? )(\d+)ms/g,
            (_, prefix, ms) => `${prefix}${Number(ms) * 2}ms`,
          );
          fs.writeFileSync(file, slower);
          NODE

      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
