name: generate snake

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/snake.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: dev-julyellens
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark

      - name: reduz velocidade da cobrinha
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path("dist/github-contribution-grid-snake.svg")
          text = path.read_text(encoding="utf-8")
          slower = re.sub(
              r"animation:none (\d+)ms",
              lambda match: f"animation:none {int(match.group(1)) * 2}ms",
              text,
          )
          path.write_text(slower, encoding="utf-8")
          PY

      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
